services:
  neo4j:
    image: neo4j:5.26-community
    container_name: cti-neo4j
    ports:
      - "7474:7474"   # HTTP browser UI
      - "7687:7687"   # Bolt driver protocol
    environment:
      # Reads NEO4J_PASSWORD from your .env file (gitignored).
      # Falls back to a default only if .env is missing.
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-SecurePassword123}
      # Enable the Graph Data Science plugin (PageRank, centrality, etc.)
      NEO4J_PLUGINS: '["graph-data-science"]'
      # Memory tuning — adjust to your machine. These are conservative defaults.
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
      # Allow GDS procedures
      NEO4J_dbms_security_procedures_unrestricted: gds.*
      NEO4J_dbms_security_procedures_allowlist: gds.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  neo4j_data:
  neo4j_logs:
